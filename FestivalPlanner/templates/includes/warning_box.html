{% if stats.count %}
<div class="fixed-warning-box no-select">
    <a class="link-black" href="{% url 'screenings:warnings' %}"> {{ stats.count }} warnings</a>
    <br>
    <small class="link-black">
    {% for symbol in stats.symbols %}
        {{ symbol.count }}
        <span style="color: {{ stats.color }};">{{ symbol.symbol }}</span>
    {% endfor %}
    </small>
</div>
{% endif %}
